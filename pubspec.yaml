name: stop_alert
description: "Travel alarm app - alerts you when near your destination"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  flutter_local_notifications: ^17.2.4
  flutter_background_service: ^5.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  uuid: ^4.4.2
  intl: ^0.19.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon_premium.png
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: assets/branding/app_icon_premium.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/sounds/
